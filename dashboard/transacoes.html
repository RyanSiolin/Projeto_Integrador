<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Transações – FinControl</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <h1>FinControl</h1>
  <div class="user">
    <span>Login</span>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <ul>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="lancamento.html">Lançamentos</a></li>
      <li><a href="transacoes.html" class="active">Transações</a></li>
      <li><a href="relatorios.html">Relatórios</a></li>
      <li><a href="educativo.html">Educação</a></li>
      <li><a href="configuracoes.html">Configurações</a></li>
    </ul>
  </div>
  <div class="content">

    <div class="header-content">
      <h2>Transações</h2>
      <a href="lancamento.html"><button class="btn btn-primary">+ Novo Lançamento</button></a>
    </div>

    <div class="chart-box">
      <div class="filters">
        <div class="form-group">
          <label for="filtroMes">Mês</label>
          <select id="filtroMes"></select>
        </div>
        <div class="form-group">
          <label for="filtroTipo">Tipo</label>
          <select id="filtroTipo">
            <option value="todos">Todos</option>
            <option value="receita">Receitas</option>
            <option value="despesa">Despesas</option>
          </select>
        </div>
        <div class="form-group">
          <label for="filtroCategoria">Categoria</label>
          <select id="filtroCategoria">
            <option value="todas">Todas</option>
          </select>
        </div>
        <div class="form-group">
          <label for="filtroBusca">Buscar</label>
          <input type="text" id="filtroBusca" placeholder="Pesquisar..." />
        </div>
        <div>
          <button class="btn btn-primary" id="btnFiltrar">Filtrar</button>
        </div>
      </div>
    </div>

    <div class="chart-box">
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Descrição</th>
            <th>Categoria</th>
            <th>Tipo</th>
            <th>Valor</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabelaTransacoes"></tbody>
      </table>
    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
