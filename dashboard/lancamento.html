<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lançamento – FinControl</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <h1>FinControl</h1>
  <div class="user">
    <span>Login</span>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <ul>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="lancamento.html" class="active">Lançamentos</a></li>
      <li><a href="transacoes.html">Transações</a></li>
      <li><a href="relatorios.html">Relatórios</a></li>
      <li><a href="educativo.html">Educação</a></li>
      <li><a href="configuracoes.html">Configurações</a></li>
    </ul>
  </div>
  <div class="content">
    <h2 style="margin-bottom: 1.5rem;">Novo Lançamento</h2>

    <div class="form-container chart-box">
      <form id="formLancamento">
        <div class="form-group">
          <label>Tipo *</label>
          <div class="radio-group">
            <label><input type="radio" name="tipo" value="receita" checked /> Receita</label>
            <label><input type="radio" name="tipo" value="despesa" /> Despesa</label>
          </div>
        </div>

        <div class="form-group">
          <label for="descricao">Descrição *</label>
          <input type="text" id="descricao" placeholder="Ex: Salário Mensal" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="valor">Valor (R$) *</label>
            <input type="text" id="valor" placeholder="0,00" required />
          </div>
          <div class="form-group">
            <label for="data">Data *</label>
            <input type="date" id="data" required />
          </div>
        </div>

        <div class="form-group">
          <label for="categoria">Categoria *</label>
          <select id="categoria" required>
            <option value="">Selecione...</option>
          </select>
        </div>

        <div class="form-group">
          <label for="observacoes">Observações</label>
          <textarea id="observacoes" placeholder="Opcional..." rows="3"></textarea>
        </div>

        <div class="form-actions">
          <a href="dashboard.html"><button type="button" class="btn btn-outline">Cancelar</button></a>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
