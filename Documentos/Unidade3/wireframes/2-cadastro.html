<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro – FinControl</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .register-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }
    .register-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .register-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .register-header i {
      font-size: 48px;
      color: #667eea;
    }
    .register-header h2 {
      margin: 16px 0 0 0;
      font-weight: 700;
      font-size: 24px;
    }
    .register-header p {
      color: #999;
      margin: 8px 0 0 0;
      font-size: 13px;
    }
    .login-link {
      text-align: center;
      font-size: 13px;
      margin-top: 16px;
    }
    .login-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="register-wrapper">
  <div class="register-card">
    <div class="register-header">
      <i class="bi bi-graph-up-arrow"></i>
      <h2>Criar Conta</h2>
      <p>Cadastre-se para começar</p>
    </div>

    <form>
      <div class="row">
        <div class="col">
          <label>Nome</label>
          <input type="text" placeholder="Ryan" />
        </div>
        <div class="col">
          <label>Sobrenome</label>
          <input type="text" placeholder="Siolin" />
        </div>
      </div>
      <div style="margin-bottom: 16px;">
        <label>E-mail</label>
        <input type="email" placeholder="seu@email.com" />
      </div>
      <div style="margin-bottom: 16px;">
        <label>Senha</label>
        <input type="password" placeholder="••••••••" />
      </div>
      <div style="margin-bottom: 16px;">
        <label>Confirmar Senha</label>
        <input type="password" placeholder="••••••••" />
      </div>
      <div style="margin-bottom: 16px;">
        <label>Perfil Financeiro</label>
        <select>
          <option>Selecione...</option>
          <option>Jovem primeiro emprego</option>
          <option>Autônomo</option>
          <option>Assalariado</option>
        </select>
      </div>
      <button type="button" class="btn btn-primary" style="width: 100%; margin-bottom: 16px;">Criar Conta</button>
    </form>

    <p class="login-link">
      Já tem conta? <a href="1-login.html">Fazer login</a>
    </p>
  </div>
</div>

</body>
</html>
