<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lançamento – FinControl</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .navbar {
      padding: 12px 24px;
      border-bottom: 1px solid #e9ecef;
    }
    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 700;
    }
    .navbar-spacer {
      flex: 1;
    }
    .navbar-user {
      color: #666;
      font-size: 14px;
      font-weight: 500;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
    }
    .radio-group {
      display: flex;
      gap: 20px;
      margin-top: 8px;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
    }
    .form-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid #e9ecef;
    }
    .btn-secondary {
      background: #f8f9fa;
      color: #333;
      border: 1px solid #e9ecef;
    }
    .btn-secondary:hover {
      background: #e9ecef;
    }
  </style>
</head>
<body>

<div class="navbar" style="display: flex; justify-content: space-between; align-items: center;">
  <div class="navbar-brand">
    <i class="bi bi-graph-up-arrow" style="color: #667eea; font-size: 24px;"></i>
    FinControl
  </div>
  <div class="navbar-user">Ryan Siolin</div>
</div>

<div class="layout">
  <div class="sidebar">
    <ul>
      <li><a href="3-dashboard.html"><i class="bi bi-speedometer2" style="margin-right: 8px;"></i>Dashboard</a></li>
      <li class="active"><i class="bi bi-plus-circle" style="margin-right: 8px;"></i>Lançamentos</li>
      <li><a href="5-transacoes.html"><i class="bi bi-arrow-left-right" style="margin-right: 8px;"></i>Transações</a></li>
      <li><a href="6-relatorios.html"><i class="bi bi-file-earmark-pdf" style="margin-right: 8px;"></i>Relatórios</a></li>
      <li><a href="7-alertas.html"><i class="bi bi-bell" style="margin-right: 8px;"></i>Alertas</a></li>
      <li><a href="8-educativo.html"><i class="bi bi-book" style="margin-right: 8px;"></i>Educação</a></li>
    </ul>
  </div>
  <div class="content">
    <h2 style="margin: 0 0 24px 0; font-size: 22px; font-weight: 700;">Novo Lançamento</h2>
    
    <div class="box" style="max-width: 500px;">
      <form>
        <div class="form-group">
          <label>Tipo *</label>
          <div class="radio-group">
            <label><input type="radio" name="tipo" checked /> Receita</label>
            <label><input type="radio" name="tipo" /> Despesa</label>
          </div>
        </div>

        <div class="form-group">
          <label>Descrição *</label>
          <input type="text" placeholder="Ex: Salário Mensal" />
        </div>

        <div class="row">
          <div class="col">
            <div class="form-group">
              <label>Valor (R$) *</label>
              <input type="text" placeholder="0,00" />
            </div>
          </div>
          <div class="col">
            <div class="form-group">
              <label>Data *</label>
              <input type="text" placeholder="dd/mm/aaaa" />
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Categoria *</label>
          <select>
            <option>Selecione...</option>
            <option>Moradia</option>
            <option>Alimentação</option>
            <option>Transporte</option>
            <option>Lazer</option>
            <option>Saúde</option>
          </select>
        </div>

        <div class="form-group">
          <label>Observações</label>
          <textarea placeholder="Opcional..."></textarea>
        </div>

        <div class="form-actions">
          <a href="3-dashboard.html" style="text-decoration: none;">
            <button type="button" class="btn btn-secondary">Cancelar</button>
          </a>
          <button type="button" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>
</div>

</body>
</html>
