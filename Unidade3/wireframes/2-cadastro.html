<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro – FinControl</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-wrapper">
  <div class="box">
    <div class="row">
      <div class="col">
        <label>Nome</label>
        <input type="text" placeholder="Ryan" />
      </div>
      <div class="col">
        <label>Sobrenome</label>
        <input type="text" placeholder="Siolin" />
      </div>
    </div>
    <div style="margin-bottom: 12px;">
      <label>E-mail</label>
      <input type="text" placeholder="seu@email.com" />
    </div>
    <div style="margin-bottom: 12px;">
      <label>Senha</label>
      <input type="password" placeholder="••••••••" />
    </div>
    <div style="margin-bottom: 12px;">
      <label>Confirmar Senha</label>
      <input type="password" placeholder="••••••••" />
    </div>
    <div style="margin-bottom: 16px;">
      <label>Perfil Financeiro</label>
      <select>
        <option>Selecione...</option>
        <option>Jovem primeiro emprego</option>
        <option>Autônomo</option>
        <option>Assalariado</option>
      </select>
    </div>
    <button class="btn" style="width: 100%;">Criar Conta</button>
    <p style="text-align: center; font-size: 12px; margin-top: 12px;">
      Já tem conta? <a href="1-login.html">Fazer login</a>
    </p>
  </div>
</div>

</body>
</html>
