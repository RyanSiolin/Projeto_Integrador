<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login – FinControl</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-wrapper">
  <div class="ph" style="height: 60px; margin-bottom: 20px;">Logo / Nome do sistema</div>
  <div class="box">
    <div style="margin-bottom: 12px;">
      <label>E-mail</label>
      <input type="text" placeholder="seu@email.com" />
    </div>
    <div style="margin-bottom: 12px;">
      <label>Senha</label>
      <input type="password" placeholder="••••••••" />
    </div>
    <div style="text-align: right; font-size: 12px; margin-bottom: 12px;">
      Esqueci minha senha
    </div>
    <button class="btn" style="width: 100%;">Entrar</button>
    <p style="text-align: center; font-size: 12px; margin-top: 12px;">
      Não tem conta? <a href="2-cadastro.html">Criar conta</a>
    </p>
  </div>
</div>

</body>
</html>
